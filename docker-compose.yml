services:
  streamlit:
    build: .
    environment:
      APP_MODE: streamlit
      PEAKINTEGRATE_DATA_ROOT: /data
      PEAKINTEGRATE_CONFIG: /app/PeakIntegrate/config/cmpds.yaml
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data

  shiny:
    build: .
    environment:
      APP_MODE: shiny
      PEAKINTEGRATE_DATA_ROOT: /data
      PEAKINTEGRATE_CONFIG: /app/PeakIntegrate/config/cmpds.yaml
      SHINY_PORT: "3838"
    ports:
      - "3838:3838"
    volumes:
      - ./data:/data

  analysis:
    build: .
    profiles: ["tools"]
    environment:
      APP_MODE: analysis
      PEAKINTEGRATE_DATA_ROOT: /data
      PEAKINTEGRATE_CONFIG: /app/PeakIntegrate/config/cmpds.yaml
    volumes:
      - ./data:/data
